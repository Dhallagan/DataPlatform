browserbase:
  target: duckdb  # Default to DuckDB (Snowflake simulation)
  outputs:
    
    # -------------------------------------------------------------------------
    # DuckDB - Local Snowflake Simulation
    # -------------------------------------------------------------------------
    duckdb:
      type: duckdb
      path: "../pipeline/warehouse.duckdb"
      threads: 4
    
    # -------------------------------------------------------------------------
    # Supabase (Postgres) - Direct connection
    # -------------------------------------------------------------------------
    supabase:
      type: postgres
      host: db.ixmbjqcguznhdwhbiuop.supabase.co
      port: 5432
      user: postgres
      password: "{{ env_var('SUPABASE_DB_PASSWORD', 'KkFuD2cko6W51fnJ') }}"
      dbname: postgres
      schema: public
      threads: 4
    
