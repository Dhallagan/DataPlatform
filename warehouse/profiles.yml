# This file is for local prototyping only
# =============================================================================

browserbase:
  target: dev
  outputs:
    
    # -------------------------------------------------------------------------
    # Development - Local Postgres (Docker)
    # -------------------------------------------------------------------------
    dev:
      type: postgres
      host: localhost
      port: 5432
      user: browserbase
      password: browserbase_dev
      dbname: browserbase
      schema: public
      threads: 4
    
