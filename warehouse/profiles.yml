# =============================================================================
# dbt Profiles - Multiple Targets
# =============================================================================

browserbase:
  target: duckdb  # Default to DuckDB (Snowflake simulation)
  outputs:
    
    # -------------------------------------------------------------------------
    # DuckDB - Local Snowflake Simulation
    # -------------------------------------------------------------------------
    duckdb:
      type: duckdb
      path: "{{ env_var('WAREHOUSE_DUCKDB_PATH', '../pipeline/warehouse.duckdb') }}"
      threads: 4

    # -------------------------------------------------------------------------
    # MotherDuck - Cloud DuckDB
    # -------------------------------------------------------------------------
    motherduck:
      type: duckdb
      path: "{{ env_var('MOTHERDUCK_PATH') }}?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
      threads: 4
    
    # -------------------------------------------------------------------------
    # Supabase (Postgres) - Direct connection
    # -------------------------------------------------------------------------
    supabase:
      type: postgres
      host: "{{ env_var('SUPABASE_DB_HOST') }}"
      port: "{{ env_var('SUPABASE_DB_PORT', '5432') | int }}"
      user: "{{ env_var('SUPABASE_DB_USER', 'postgres') }}"
      password: "{{ env_var('SUPABASE_DB_PASSWORD') }}"
      dbname: "{{ env_var('SUPABASE_DB_NAME', 'postgres') }}"
      schema: "{{ env_var('SUPABASE_DB_SCHEMA', 'public') }}"
      threads: 4
    
    # -------------------------------------------------------------------------
