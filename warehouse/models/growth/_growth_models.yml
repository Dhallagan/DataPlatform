version: 2

models:
  - name: growth_daily
    description: Daily growth and activation metrics.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique
      - name: new_organizations
        tests:
          - not_null
      - name: new_users
        tests:
          - not_null

  - name: growth_kpis
    description: 30-day growth KPI summary.
    columns:
      - name: as_of_date
        tests:
          - not_null
          - unique

  - name: cohort_retention
    description: Weekly organization cohort retention.
    columns:
      - name: cohort_week
        tests:
          - not_null
      - name: weeks_since_signup
        tests:
          - not_null
      - name: retention_pct
        tests:
          - not_null

  - name: active_organizations
    description: Active organizations in the last 30 days.
    columns:
      - name: organization_id
        tests:
          - not_null
          - unique
      - name: activity_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['low_activity', 'medium_activity', 'high_activity']

  - name: signal_thresholds
    description: Configured thresholds for growth workflow signal routing.
    columns:
      - name: signal_name
        tests:
          - not_null
      - name: threshold_name
        tests:
          - not_null
      - name: threshold_value
        tests:
          - not_null

  - name: signal_trial_conversion_risk_daily
    description: Daily trial conversion risk signals at organization grain.
    columns:
      - name: signal_id
        tests:
          - not_null
          - unique
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('organizations')
                field: organization_id
      - name: signal_score
        tests:
          - not_null
      - name: reason_code
        tests:
          - not_null

  - name: growth_task_queue
    description: Queue of high-risk trial organizations for growth action.
    columns:
      - name: task_id
        tests:
          - not_null
          - unique
      - name: signal_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('signal_trial_conversion_risk_daily')
                field: signal_id
      - name: task_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending']
      - name: priority
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['normal', 'high', 'urgent']

  - name: action_log
    description: Auditable action log schema for downstream workflow execution.
    columns:
      - name: action_id
        tests:
          - not_null
          - unique
      - name: signal_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('signal_trial_conversion_risk_daily')
                field: signal_id
      - name: task_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('growth_task_queue')
                field: task_id
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('organizations')
                field: organization_id
      - name: action_type
        tests:
          - not_null
      - name: executed_at
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['success', 'failed']

  - name: gtm_funnel_daily
    description: Daily GTM funnel metrics from leads and opportunities.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique
      - name: leads_created
        tests:
          - not_null
      - name: opportunities_created
        tests:
          - not_null
      - name: closed_won_amount_usd
        tests:
          - not_null

  - name: gtm_pipeline_snapshot
    description: Current GTM pipeline and conversion snapshot.
    columns:
      - name: as_of_date
        tests:
          - not_null
          - unique
      - name: leads_total
        tests:
          - not_null
      - name: open_pipeline_usd
        tests:
          - not_null

  - name: gtm_lifecycle_accounts
    description: GTM lifecycle spine from prospect through paid usage and retention, at account grain.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: lifecycle_stage
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['target', 'prospect', 'qualified', 'opportunity', 'closed_won', 'paid_customer', 'active_customer', 'retained_customer', 'churned']
      - name: did_pay
        tests:
          - not_null
      - name: is_using
        tests:
          - not_null
      - name: is_staying_30d
        tests:
          - not_null

  - name: gtm_campaign_channel_performance
    description: Monthly campaign and channel funnel attribution with owner and ROAS metrics.
    columns:
      - name: metric_month
        tests:
          - not_null
      - name: campaign_id
        tests:
          - not_null
      - name: leads_created
        tests:
          - not_null
      - name: opportunities_total
        tests:
          - not_null
      - name: won_revenue_usd
        tests:
          - not_null

  - name: gtm_unit_economics_monthly
    description: Monthly GTM unit economics layer with CAC, retention, ARPU, and LTV proxy metrics.
    columns:
      - name: metric_month
        tests:
          - not_null
          - unique
      - name: campaign_spend_usd
        tests:
          - not_null
      - name: cac_usd
        tests:
          - not_null:
              config:
                where: "new_paid_customers > 0"
      - name: retention_30d_rate
        tests:
          - not_null:
              config:
                where: "new_paid_customers > 0"

unit_tests:
  - name: growth_task_queue_applies_threshold_and_priority
    model: growth_task_queue
    given:
      - input: ref('signal_thresholds')
        rows:
          - {signal_name: trial_conversion_risk, threshold_name: high_risk, threshold_value: 0.80, comparator: ">=", is_active: true}
      - input: ref('signal_trial_conversion_risk_daily')
        rows:
          - {signal_id: sig-urgent, organization_id: org_1, organization_name: Org One, signal_score: 0.95, reason_code: no_recent_usage, triggered_at: "2026-02-20 10:00:00", expires_at: "2026-02-21 10:00:00"}
          - {signal_id: sig-high, organization_id: org_2, organization_name: Org Two, signal_score: 0.82, reason_code: low_success_rate, triggered_at: "2026-02-20 10:00:00", expires_at: "2026-02-21 10:00:00"}
          - {signal_id: sig-below, organization_id: org_3, organization_name: Org Three, signal_score: 0.79, reason_code: composite_risk, triggered_at: "2026-02-20 10:00:00", expires_at: "2026-02-21 10:00:00"}
    expect:
      rows:
        - {task_id: growth_task|sig-urgent, signal_id: sig-urgent, organization_id: org_1, organization_name: Org One, queue_name: growth_trial_save, action_type: intervene_trial_conversion, priority: urgent, task_status: pending, reason_code: no_recent_usage, signal_score: 0.95, created_at: "2026-02-20 10:00:00", due_at: "2026-02-21 10:00:00"}
        - {task_id: growth_task|sig-high, signal_id: sig-high, organization_id: org_2, organization_name: Org Two, queue_name: growth_trial_save, action_type: intervene_trial_conversion, priority: high, task_status: pending, reason_code: low_success_rate, signal_score: 0.82, created_at: "2026-02-20 10:00:00", due_at: "2026-02-21 10:00:00"}

  - name: growth_task_queue_includes_exact_threshold_and_normal_priority
    model: growth_task_queue
    given:
      - input: ref('signal_thresholds')
        rows:
          - {signal_name: trial_conversion_risk, threshold_name: high_risk, threshold_value: 0.80, comparator: ">=", is_active: true}
      - input: ref('signal_trial_conversion_risk_daily')
        rows:
          - {signal_id: sig-threshold, organization_id: org_4, organization_name: Org Four, signal_score: 0.80, reason_code: composite_risk, triggered_at: "2026-02-22 09:30:00", expires_at: "2026-02-23 09:30:00"}
          - {signal_id: sig-normal, organization_id: org_5, organization_name: Org Five, signal_score: 0.805, reason_code: low_success_rate, triggered_at: "2026-02-22 09:30:00", expires_at: "2026-02-23 09:30:00"}
          - {signal_id: sig-excluded, organization_id: org_6, organization_name: Org Six, signal_score: 0.799, reason_code: trial_ending_soon, triggered_at: "2026-02-22 09:30:00", expires_at: "2026-02-23 09:30:00"}
    expect:
      rows:
        - {task_id: growth_task|sig-threshold, signal_id: sig-threshold, organization_id: org_4, organization_name: Org Four, queue_name: growth_trial_save, action_type: intervene_trial_conversion, priority: high, task_status: pending, reason_code: composite_risk, signal_score: 0.80, created_at: "2026-02-22 09:30:00", due_at: "2026-02-23 09:30:00"}
        - {task_id: growth_task|sig-normal, signal_id: sig-normal, organization_id: org_5, organization_name: Org Five, queue_name: growth_trial_save, action_type: intervene_trial_conversion, priority: high, task_status: pending, reason_code: low_success_rate, signal_score: 0.805, created_at: "2026-02-22 09:30:00", due_at: "2026-02-23 09:30:00"}
