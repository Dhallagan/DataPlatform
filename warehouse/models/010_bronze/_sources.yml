version: 2

sources:
  - name: bronze_supabase
    description: Raw tables from source database
    # Database varies by target:
    # - supabase target: target database
    # - duckdb/motherduck targets: bronze database alias
    database: "{{ target.database }}"
    # Schema varies by target:
    # - supabase target: public (direct Postgres)
    # - duckdb target: bronze_supabase (replicated)
    schema: "{{ 'public' if target.name == 'supabase' else 'bronze_supabase' }}"
    
    tables:
      - name: organizations
        description: Customer organizations (the billing entity)
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: users
        description: Individual users
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: organization_members
        description: Junction table for users ↔ organizations
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: plans
        description: Subscription pricing plans
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: subscriptions
        description: Organization subscriptions to plans
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: api_keys
        description: API keys for programmatic access
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: projects
        description: Logical groupings of sessions within an org
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: browser_sessions
        description: Core product - browser session instances
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: session_events
        description: Events that occurred during browser sessions
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: usage_records
        description: Monthly usage aggregates per organization
        columns:
          - name: id
            tests:
              - unique
              - not_null
      
      - name: invoices
        description: Billing invoices
        columns:
          - name: id
            tests:
              - unique
              - not_null

  - name: bronze_supabase_gtm
    description: Raw GTM tables from source database
    database: "{{ target.database }}"
    # Schema varies by target:
    # - supabase target: gtm (direct Postgres)
    # - duckdb/motherduck targets: bronze_supabase (replicated with gtm_ prefix)
    schema: "{{ 'gtm' if target.name == 'supabase' else 'bronze_supabase' }}"

    tables:
      - name: employees
        identifier: "{{ 'employees' if target.name == 'supabase' else 'gtm_employees' }}"
        description: Internal GTM employee directory for account/lead/opportunity ownership

      - name: accounts
        identifier: "{{ 'accounts' if target.name == 'supabase' else 'gtm_accounts' }}"
        description: GTM account records (company-level CRM entities)
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: contacts
        identifier: "{{ 'contacts' if target.name == 'supabase' else 'gtm_contacts' }}"
        description: GTM contact records linked to accounts
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: leads
        identifier: "{{ 'leads' if target.name == 'supabase' else 'gtm_leads' }}"
        description: Inbound/outbound lead records
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: campaigns
        identifier: "{{ 'campaigns' if target.name == 'supabase' else 'gtm_campaigns' }}"
        description: Campaign metadata and spend dimensions
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: lead_touches
        identifier: "{{ 'lead_touches' if target.name == 'supabase' else 'gtm_lead_touches' }}"
        description: Attribution touches linked to leads
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: opportunities
        identifier: "{{ 'opportunities' if target.name == 'supabase' else 'gtm_opportunities' }}"
        description: Sales pipeline opportunities
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: activities
        identifier: "{{ 'activities' if target.name == 'supabase' else 'gtm_activities' }}"
        description: Call/email/meeting/demo activity logs
        columns:
          - name: id
            tests:
              - unique
              - not_null

  - name: bronze_supabase_finance
    description: Raw Finance (Ramp-like) tables from source database
    database: "{{ target.database }}"
    # Schema varies by target:
    # - supabase target: finance (direct Postgres)
    # - duckdb/motherduck targets: bronze_supabase (replicated with finance_ prefix)
    schema: "{{ 'finance' if target.name == 'supabase' else 'bronze_supabase' }}"

    tables:
      - name: departments
        identifier: "{{ 'departments' if target.name == 'supabase' else 'finance_departments' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: vendors
        identifier: "{{ 'vendors' if target.name == 'supabase' else 'finance_vendors' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: cards
        identifier: "{{ 'cards' if target.name == 'supabase' else 'finance_cards' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: transactions
        identifier: "{{ 'transactions' if target.name == 'supabase' else 'finance_transactions' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: reimbursements
        identifier: "{{ 'reimbursements' if target.name == 'supabase' else 'finance_reimbursements' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: bills
        identifier: "{{ 'bills' if target.name == 'supabase' else 'finance_bills' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: bill_payments
        identifier: "{{ 'bill_payments' if target.name == 'supabase' else 'finance_bill_payments' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: bill_adjustments
        identifier: "{{ 'bill_adjustments' if target.name == 'supabase' else 'finance_bill_adjustments' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null

      - name: payment_reversals
        identifier: "{{ 'payment_reversals' if target.name == 'supabase' else 'finance_payment_reversals' }}"
        columns:
          - name: id
            tests:
              - unique
              - not_null
