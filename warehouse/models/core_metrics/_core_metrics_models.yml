version: 2

models:
  - name: table_catalog
    description: Canonical table-level metadata catalog for explorer and agents.
    columns:
      - name: table_key
        tests:
          - not_null
          - unique
      - name: table_schema
        tests:
          - not_null
      - name: table_name
        tests:
          - not_null
      - name: column_count
        tests:
          - not_null

  - name: column_catalog
    description: Canonical column-level metadata catalog for explorer and agents.
    columns:
      - name: table_key
        tests:
          - not_null
      - name: column_name
        tests:
          - not_null
      - name: ordinal_position
        tests:
          - not_null

  - name: metric_catalog
    description: Canonical metric catalog derived from certified metric registry.
    columns:
      - name: metric_key
        tests:
          - not_null
          - unique
      - name: certified
        tests:
          - not_null
      - name: owner
        tests:
          - not_null
      - name: freshness_sla
        tests:
          - not_null

  - name: lineage_catalog
    description: Canonical lineage edges catalog derived from dbt manifest ingestion.
    columns:
      - name: child_object
        tests:
          - not_null
      - name: parent_object
        tests:
          - not_null
      - name: child_unique_id
        tests:
          - not_null
      - name: parent_unique_id
        tests:
          - not_null

  - name: metric_registry
    description: Certified business metric definitions for self-serve and LLM workflows.
    columns:
      - name: metric_name
        tests:
          - not_null
          - unique
      - name: certified
        tests:
          - not_null
      - name: business_definition
        tests:
          - not_null
      - name: sql_definition_or_model
        tests:
          - not_null
      - name: grain
        tests:
          - not_null
      - name: owner
        tests:
          - not_null
      - name: freshness_sla
        tests:
          - not_null
      - name: version
        tests:
          - not_null
      - name: effective_date
        tests:
          - not_null

  - name: metric_spine
    description: Canonical organization-level daily metric spine for self-serve analytics.
    columns:
      - name: metric_date
        tests:
          - not_null
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_organizations')
                field: organization_id
      - name: runs
        tests:
          - not_null
      - name: successful_runs
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null
      - name: mrr_usd
        tests:
          - not_null

  - name: daily_kpis
    description: Daily executive KPI rollup.
    columns:
      - name: date
        tests:
          - not_null
          - unique
      - name: total_sessions
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null
