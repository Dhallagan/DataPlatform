version: 2

models:
  - name: metric_spine
    description: Canonical organization-level daily metric spine for self-serve analytics.
    columns:
      - name: metric_date
        tests:
          - not_null
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_organizations')
                field: organization_id
      - name: runs
        tests:
          - not_null
      - name: successful_runs
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null
      - name: mrr_usd
        tests:
          - not_null

  - name: daily_kpis
    description: Daily executive KPI rollup.
    columns:
      - name: date
        tests:
          - not_null
          - unique
      - name: total_sessions
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null
