version: 2

models:
  - name: engineering_daily
    description: Daily reliability and latency metrics.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique
      - name: total_sessions
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null

  - name: engineering_kpis
    description: 30-day engineering KPI summary.
    columns:
      - name: as_of_date
        tests:
          - not_null
          - unique
