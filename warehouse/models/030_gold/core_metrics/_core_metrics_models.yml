version: 2

models:
  - name: table_catalog
    description: Canonical table-level metadata catalog for explorer and agents.
    columns:
      - name: table_key
        tests:
          - not_null
          - unique
      - name: table_schema
        tests:
          - not_null
      - name: table_name
        tests:
          - not_null
      - name: column_count
        tests:
          - not_null

  - name: column_catalog
    description: Canonical column-level metadata catalog for explorer and agents.
    columns:
      - name: table_key
        tests:
          - not_null
      - name: column_name
        tests:
          - not_null
      - name: ordinal_position
        tests:
          - not_null

  - name: metric_catalog
    description: Canonical metric catalog derived from certified metric registry.
    columns:
      - name: metric_key
        tests:
          - not_null
          - unique
      - name: certified
        tests:
          - not_null
      - name: owner
        tests:
          - not_null
      - name: freshness_sla
        tests:
          - not_null

  - name: lineage_catalog
    description: Canonical lineage edges catalog derived from dbt manifest ingestion.
    columns:
      - name: child_object
        tests:
          - not_null
      - name: parent_object
        tests:
          - not_null
      - name: child_unique_id
        tests:
          - not_null
      - name: parent_unique_id
        tests:
          - not_null

  - name: metric_registry
    description: Certified business metric definitions for self-serve and LLM workflows.
    columns:
      - name: metric_name
        tests:
          - not_null
          - unique
      - name: certified
        tests:
          - not_null
      - name: business_definition
        tests:
          - not_null
      - name: sql_definition_or_model
        tests:
          - not_null
      - name: grain
        tests:
          - not_null
      - name: owner
        tests:
          - not_null
      - name: freshness_sla
        tests:
          - not_null
      - name: version
        tests:
          - not_null
      - name: effective_date
        tests:
          - not_null

  - name: metric_spine
    description: Canonical organization-level daily metric spine for self-serve analytics.
    columns:
      - name: metric_date
        tests:
          - not_null
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('organizations')
                field: organization_id
      - name: runs
        tests:
          - not_null
      - name: successful_runs
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null
      - name: mrr_usd
        tests:
          - not_null

  - name: daily_kpis
    description: Daily executive KPI rollup.
    columns:
      - name: date
        tests:
          - not_null
          - unique
      - name: total_sessions
        tests:
          - not_null
      - name: success_rate_pct
        tests:
          - not_null

  - name: fct_terminal_exec_daily
    description: Unified daily fact spine for executive business terminal widgets.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique

  - name: fct_terminal_gtm_daily
    description: Daily GTM fact spine for funnel, pipeline, and growth context.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique

  - name: fct_terminal_product_daily
    description: Daily product/ops reliability fact spine for terminal charts.
    columns:
      - name: metric_date
        tests:
          - not_null
          - unique

  - name: fct_terminal_finance_monthly
    description: Monthly finance fact spine for budget, spend, and revenue quality widgets.
    columns:
      - name: metric_month
        tests:
          - not_null
          - unique

  - name: fct_terminal_customer_daily
    description: Customer-level daily fact spine for revenue, risk, reliability, and queue drilldowns.
    columns:
      - name: organization_id
        tests:
          - not_null
          - relationships:
              to: ref('organizations')
              field: organization_id
      - name: metric_date
        tests:
          - not_null

  - name: fct_business_snapshot_monthly
    description: Canonical monthly organization snapshot across GTM, finance, ops, and product.
    columns:
      - name: organization_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('organizations')
                field: organization_id
      - name: month_start
        tests:
          - not_null
      - name: month_end
        tests:
          - not_null
      - name: total_runs
        tests:
          - not_null
      - name: successful_runs
        tests:
          - not_null
      - name: recognized_revenue_usd
        tests:
          - not_null
      - name: total_spend_usd
        tests:
          - not_null
      - name: new_leads
        tests:
          - not_null
      - name: new_opportunities
        tests:
          - not_null
