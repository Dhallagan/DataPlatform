version: 2

models:
  - name: stg_organizations
    description: Cleaned organizations from bronze.
    columns:
      - name: organization_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'suspended', 'churned']

  - name: stg_users
    description: Cleaned users from bronze.
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null

  - name: stg_plans
    description: Cleaned plans from bronze.
    columns:
      - name: plan_id
        tests:
          - not_null
          - unique
      - name: plan_name
        tests:
          - not_null
      - name: monthly_price_usd
        tests:
          - not_null

  - name: stg_subscriptions
    description: Cleaned subscriptions from bronze.
    columns:
      - name: subscription_id
        tests:
          - not_null
          - unique
      - name: organization_id
        tests:
          - not_null
      - name: plan_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['trialing', 'active', 'past_due', 'canceled']

  - name: stg_sessions
    description: Cleaned sessions from bronze.
    columns:
      - name: session_id
        tests:
          - not_null
          - unique
      - name: organization_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'running', 'completed', 'failed', 'timeout']

  - name: stg_gtm_accounts
    description: Cleaned GTM account records from bronze.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: account_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['target', 'engaged', 'customer', 'churned']

  - name: stg_gtm_contacts
    description: Cleaned GTM contact records from bronze.
    columns:
      - name: contact_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_gtm_accounts')
                field: account_id

  - name: stg_gtm_leads
    description: Cleaned GTM lead records from bronze.
    columns:
      - name: lead_id
        tests:
          - not_null
          - unique
      - name: lead_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['inbound', 'outbound', 'partner', 'referral', 'plg']
      - name: lead_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['new', 'working', 'nurturing', 'qualified', 'unqualified', 'converted']

  - name: stg_gtm_campaigns
    description: Cleaned GTM campaign records from bronze.
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique
      - name: campaign_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['planned', 'active', 'paused', 'completed']

  - name: stg_gtm_lead_touches
    description: Cleaned GTM lead touch attribution records from bronze.
    columns:
      - name: touch_id
        tests:
          - not_null
          - unique
      - name: lead_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_gtm_leads')
                field: lead_id

  - name: stg_gtm_opportunities
    description: Cleaned GTM opportunity records from bronze.
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: stage
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['prospecting', 'qualification', 'proposal', 'negotiation', 'closed_won', 'closed_lost']

  - name: stg_gtm_activities
    description: Cleaned GTM activity records from bronze.
    columns:
      - name: activity_id
        tests:
          - not_null
          - unique
      - name: activity_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['email', 'call', 'meeting', 'demo', 'task']

  - name: stg_finance_departments
    description: Cleaned finance department records from bronze.
    columns:
      - name: department_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'archived']

  - name: stg_finance_vendors
    description: Cleaned finance vendor records from bronze.
    columns:
      - name: vendor_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'blocked']

  - name: stg_finance_cards
    description: Cleaned finance card records from bronze.
    columns:
      - name: card_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'frozen', 'canceled']

  - name: stg_finance_transactions
    description: Cleaned finance transaction records from bronze.
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'posted', 'cleared', 'declined', 'reversed']

  - name: stg_finance_reimbursements
    description: Cleaned finance reimbursement records from bronze.
    columns:
      - name: reimbursement_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['submitted', 'approved', 'rejected', 'paid']

  - name: stg_finance_bills
    description: Cleaned finance bill records from bronze.
    columns:
      - name: bill_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['submitted', 'approved', 'scheduled', 'paid', 'void']

  - name: stg_finance_bill_payments
    description: Cleaned finance bill payment records from bronze.
    columns:
      - name: bill_payment_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['scheduled', 'processing', 'paid', 'failed', 'canceled']

  - name: stg_finance_bill_adjustments
    description: Cleaned finance bill adjustment records from bronze.
    columns:
      - name: bill_adjustment_id
        tests:
          - not_null
          - unique
      - name: adjustment_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_memo', 'write_off', 'reversal', 'other']
      - name: direction
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['decrease', 'increase']

  - name: stg_finance_payment_reversals
    description: Cleaned finance payment reversal records from bronze.
    columns:
      - name: payment_reversal_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'completed', 'failed', 'canceled']
