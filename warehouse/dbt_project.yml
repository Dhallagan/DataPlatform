name: 'browserbase_warehouse'
version: '1.0.0'
config-version: 2

profile: 'browserbase'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Model Configuration
# =============================================================================
# Strict medallion in one database:
#   bronze_supabase  (raw replicated sources)
#   silver           (staging views + core entities/facts/dims)
#   gtm/pro/fin/eng/ops/core  (domain-scoped gold models)
# =============================================================================
models:
  browserbase_warehouse:

    # -------------------------------------------------------------------------
    # SILVER — canonical transformed layer
    # -------------------------------------------------------------------------
    020_silver:
      +database: "{{ target.database }}"
      +tags: ['silver']
      staging:
        +schema: silver
        +materialized: view
        +tags: ['staging', 'silver']

      core:
        +schema: core
        +materialized: table
        +tags: ['core']

    # -------------------------------------------------------------------------
    # GOLD — domain-scoped analyst-facing models
    # -------------------------------------------------------------------------
    030_gold:
      +database: "{{ target.database }}"
      +materialized: view
      +tags: ['gold']
      compat_legacy:
        +enabled: false
      growth:
        +schema: gtm
      product:
        +schema: pro
        +materialized: table
      finance:
        +schema: fin
      eng:
        +schema: eng
      ops:
        +schema: ops
      core_metrics:
        +schema: core
        +materialized: table

# =============================================================================
# Variables
# =============================================================================
vars:
  start_date: '2025-08-01'
  end_date: '2026-02-28'

seeds:
  browserbase_warehouse:
    +database: "{{ target.database }}"
    +schema: core
    core:
      +database: "{{ target.database }}"
      +schema: silver
      dim_time_seed:
        +quote_columns: false
    metadata:
      +database: "{{ target.database }}"
      +schema: core
      +quote_columns: false
