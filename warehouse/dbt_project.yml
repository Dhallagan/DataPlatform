name: 'browserbase_warehouse'
version: '1.0.0'
config-version: 2

profile: 'browserbase'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Model Configuration
# =============================================================================
# Two databases:
#   warehouse (default) — bronze + silver (plumbing)
#   analytics           — division schemas (analyst-facing)
# =============================================================================
models:
  browserbase_warehouse:

    # -------------------------------------------------------------------------
    # STAGING — warehouse.silver (views)
    # -------------------------------------------------------------------------
    staging:
      +schema: silver
      +materialized: view
      +tags: ['staging', 'silver']

    # -------------------------------------------------------------------------
    # CORE — warehouse.silver (tables)
    # -------------------------------------------------------------------------
    core:
      +schema: silver
      +materialized: table
      +tags: ['core', 'silver']

    # -------------------------------------------------------------------------
    # ANALYTICS — domain schemas in analytics database
    # -------------------------------------------------------------------------
    growth:
      +database: analytics
      +schema: growth
      +materialized: view
      +tags: ['analytics', 'growth']

    product:
      +database: analytics
      +schema: product
      +materialized: table
      +tags: ['analytics', 'product']

    finance:
      +database: analytics
      +schema: finance
      +materialized: view
      +tags: ['analytics', 'finance']

    eng:
      +database: analytics
      +schema: eng
      +materialized: view
      +tags: ['analytics', 'eng']

    ops:
      +database: analytics
      +schema: ops
      +materialized: view
      +tags: ['analytics', 'ops']

    core_metrics:
      +database: analytics
      +schema: core
      +materialized: view
      +tags: ['analytics', 'core']

# =============================================================================
# Variables
# =============================================================================
vars:
  start_date: '2025-08-01'
  end_date: '2026-02-28'
