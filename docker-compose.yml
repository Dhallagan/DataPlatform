version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL (Supabase-like source database)
  # This simulates the production Supabase database
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: browserbase_postgres
    environment:
      POSTGRES_USER: browserbase
      POSTGRES_PASSWORD: browserbase_dev
      POSTGRES_DB: browserbase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U browserbase"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------------
  # DuckDB-based "Warehouse" (lightweight Snowflake alternative for prototyping)
  # For the actual demo, we'll query this with dbt or raw SQL
  # -----------------------------------------------------------------------------
  
  # -----------------------------------------------------------------------------
  # Adminer (lightweight DB admin UI)
  # -----------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: browserbase_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
