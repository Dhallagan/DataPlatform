name: Data Platform Freshness

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  freshness-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install duckdb requests

      - name: Run freshness check
        env:
          MOTHERDUCK_PATH: ${{ secrets.MOTHERDUCK_PATH }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          WAREHOUSE_DUCKDB_PATH: ${{ secrets.WAREHOUSE_DUCKDB_PATH }}
          ANALYTICS_DUCKDB_PATH: ${{ secrets.ANALYTICS_DUCKDB_PATH }}
          FRESHNESS_THRESHOLDS_JSON: ${{ vars.FRESHNESS_THRESHOLDS_JSON }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          python pipeline/check_freshness.py --format text
